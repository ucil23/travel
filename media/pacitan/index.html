                  var scale =
                    window.innerWidth / document.documentElement.clientWidth;
                  var width = document.documentElement.clientWidth;
                  var height = Math.round(window.innerHeight / scale);
                  viewer.style.width = width + "px";
                  viewer.style.height = height + "px";
                  viewer.style.left =
                    Math.round((window.innerWidth - width) * 0.5) + "px";
                  viewer.style.top =
                    Math.round((window.innerHeight - height) * 0.5) + "px";
                  viewer.style.transform =
                    "scale(" + scale + ", " + scale + ")";
                  window.scrollTo(0, 0);
                }, delay);
              });
            };
            window.addEventListener("resize", onResize);
            onResize();
          }
        }

        if (isOVRWeb()) {
          showPreloader();
          loadTour();
          return;
        }

        showPreloader();
        loadTour();
      }

      function playVideo(video) {
        function isSafariDesktopV11orGreater() {
          return (
            /^((?!chrome|android|crios|ipad|iphone).)*safari/i.test(
              navigator.userAgent,
            ) &&
            parseFloat(
              /Version\/([0-9]+\.[0-9]+)/i.exec(navigator.userAgent)[1],
            ) >= 11
          );
        }

        function detectUserAction() {
          var onVideoClick = function (e) {
            if (video.paused) {
              video.play();
            }
            video.muted = false;
            e.stopPropagation();
            e.stopImmediatePropagation();
            e.preventDefault();
            video.removeEventListener("click", onVideoClick);
            video.removeEventListener("touchend", onVideoClick);
          };
          video.addEventListener("click", onVideoClick);
          video.addEventListener("touchend", onVideoClick);
        }

        if (isSafariDesktopV11orGreater()) {
          video.muted = true;
          video.play();
        } else {
          var canPlay = true;
          var promise = video.play();
          if (promise) {
            promise.catch(function () {
              video.muted = true;
              video.play();
              detectUserAction();
            });
          } else {
            canPlay = false;
          }

          if (!canPlay || video.muted) {
            detectUserAction();
          }
        }
      }

      function isOVRWeb() {
        return (
          window.location.hash.substring(1).split("&").indexOf("ovrweb") > -1
        );
      }

    <!-- LOGIKA JAVASCRIPT WIDGET AI -->
    <script>
      // =========================================================================
      // KUNCI API GEMINI
      // Kosongkan ini jika Anda mengetes di dalam Canvas/Preview platform kami.
      // Isi dengan API Key Anda (contoh: "AIzaSy...") JIKA Anda mengetesnya di
      // komputer Anda (Live Server) atau Hosting Anda sendiri.
      // =========================================================================
      const apiKey = "AIzaSyCuqbPNA0hyrpAzZihsq1UsaY35atqUWCQ";

      document.addEventListener("DOMContentLoaded", function () {
        const chatFab = document.getElementById("gt-chat-fab");
        const chatPanel = document.getElementById("gt-chat-panel");
        const closeBtn = document.getElementById("gt-close-chat");
        const chatBody = document.getElementById("gt-chat-body");
        const chatInput = document.getElementById("gt-chat-input");
        const sendBtn = document.getElementById("gt-send-btn");
        const quickActions = document.getElementById("gt-quick-actions");

        // Instruksi Sistem untuk membentuk persona AI
        const systemPrompt = `Anda adalah asisten pemandu virtual resmi untuk "Virtual Field Trip Pacitan Geopark" dari GeoTalk Media (https://geotalkmedia.id/). 
            Tugas Anda adalah memandu pengunjung yang sedang melihat panorama 360 derajat Geopark Pacitan. 
            Bersikaplah ramah, antusias, dan berikan penjelasan mendalam mengenai aspek geologi, sejarah, dan pariwisata Pacitan.
            Jawablah dalam bahasa Indonesia. Format teks Anda dengan Markdown dasar (seperti **tebal** untuk penekanan) agar mudah dibaca.
            Jaga agar jawaban Anda informatif namun tidak terlalu panjang agar nyaman dibaca di widget chat kecil.`;

        // Riwayat percakapan
        let chatHistory = [];

        function toggleChat() {
          chatPanel.classList.toggle("active");
          if (chatPanel.classList.contains("active")) {
            chatInput.focus();
          }
        }

        chatFab.addEventListener("click", toggleChat);
        closeBtn.addEventListener("click", toggleChat);

        function scrollToBottom() {
          chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Fungsi mengubah markdown tebal ke HTML
        function formatTextToHTML(text) {
          let html = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
          html = html.replace(/\*(.*?)\*/g, "<em>$1</em>");
          html = html.replace(/\n/g, "<br>");
          return html;
        }

        function appendMessage(text, sender) {
          const msgDiv = document.createElement("div");
          msgDiv.className = `message ${sender === "user" ? "msg-user" : "msg-ai"}`;

          if (sender === "ai") {
            msgDiv.innerHTML = formatTextToHTML(text);
          } else {
            msgDiv.textContent = text;
          }

          chatBody.insertBefore(msgDiv, quickActions);
          scrollToBottom();
        }

        function showTypingIndicator() {
          const typingDiv = document.createElement("div");
          typingDiv.className = "typing-indicator";
          typingDiv.id = "gt-typing";
          typingDiv.innerHTML = `
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                `;
          chatBody.insertBefore(typingDiv, quickActions);
          scrollToBottom();
          return typingDiv;
        }

        // Fungsi panggil Gemini API dengan Backoff dan Auto-Switch Model
        async function fetchGeminiResponse(userText) {
          const modelName = "gemini-flash-latest";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

          chatHistory.push({ text: userText });
          const recentHistoryText = chatHistory
            .slice(-5)
            .map((msg) => msg.text)
            .join("\n---\n");

          const payload = {
            contents: [
              {
                parts: [
                  {
                    text: `Konteks Percakapan Sebelumnya:\n${recentHistoryText}\n\nPesan Pengguna Saat Ini: ${userText}`,
                  },
                ],
              },
            ],
            systemInstruction: {
              parts: [{ text: systemPrompt }],
            },
          };

          const delays = [1000, 2000, 4000, 8000, 16000];

          for (let i = 0; i <= delays.length; i++) {
            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

              if (!response.ok)
                throw new Error(`HTTP error! status: ${response.status}`);

              const result = await response.json();
              const aiReply = result.candidates?.[0]?.content?.parts?.[0]?.text;

              if (aiReply) {
                return aiReply;
              } else {
                throw new Error("Format balasan API tidak terduga");
              }
            } catch (error) {
              if (i === delays.length) {
                return "Maaf, koneksi ke server AI saat ini sedang tidak stabil. Pastikan API key Anda valid jika diuji di luar platform ini.";
              }
              await new Promise((resolve) => setTimeout(resolve, delays[i]));
            }
          }
        }

        // Aksi cepat
        window.sendQuickAction = async function (text) {
          chatInput.value = text;
          sendMessage();
        };

        async function sendMessage() {
          const text = chatInput.value.trim();
          if (!text) return;

          chatInput.value = "";
          chatInput.disabled = true;
          sendBtn.disabled = true;

          appendMessage(text, "user");
          quickActions.style.display = "none";

          const typingIndicator = showTypingIndicator();
          const replyText = await fetchGeminiResponse(text);

          if (document.getElementById("gt-typing")) {
            document.getElementById("gt-typing").remove();
          }
          appendMessage(replyText, "ai");

          chatInput.disabled = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        chatInput.addEventListener("keypress", function (e) {
          if (e.key === "Enter") sendMessage();
        });
      });
    </script>

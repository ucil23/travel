    <script type="text/javascript">
        var player;
        var playersPlayingTmp = [];
        var isInitialized = false;
        var isPaused = false;

        function loadTour()
        {
            if(player)
                return;

            var beginFunc = function(event){
                if(event.name == 'begin')
                {
                    var camera = event.data.source.get('camera');
                    if(camera && camera.get('initialSequence') && camera.get('initialSequence').get('movements').length > 0)
                        return;
                }

                if(event.sourceClassName == "MediaAudio")
                    return;

                isInitialized = true;

                player.unbind('preloadMediaShow', beginFunc, player, true);
                player.unbindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
                player.unbind('stateChange', beginFunc, player, true);
                window.parent.postMessage("tourLoaded", '*');

                disposePreloader();

                onVirtualTourLoaded();
            };

            var settings = new TDV.PlayerSettings();
            
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1775995660279');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1775995660279');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1775995660279');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1775995660279');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);
            player.bind('stateChange', beginFunc, player, true);
            player.bindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
            player.bindOnObject('rootPlayer', 'start', function(e){
                var queryDict = {}; location.search.substr(1).split("&").forEach(function(item) {var k = item.split("=")[0], v = decodeURIComponent(item.split("=")[1]);queryDict[k] = v});
                var item = undefined;
                if("media-index" in queryDict){
                    item = setMediaByIndex(parseInt(queryDict["media-index"]) - 1);
                }
                else if("media-name" in queryDict){
                    item = setMediaByName(queryDict["media-name"]);
                }
                else{
                    item = setMediaByIndex(0);
                }
                if(item != undefined && "trigger-overlay-name" in queryDict){
                    triggerOverlayByName(item, queryDict["trigger-overlay-name"], "trigger-overlay-event" in queryDict ? queryDict["trigger-overlay-event"] : "click");
                }

                player.getById('rootPlayer').bind('tourEnded', function(){
                    onVirtualTourEnded();
                }, player, true);
            }, player, false);

            /* Listen messages */
            window.addEventListener('message', function (e) {
                //Listen to messages for make actions to player in the format function:param1,param2
                var action = e.data;
                if (action == 'pauseTour' || action == 'resumeTour') {
                    this[action].apply(this);
                }
            });
        }

        function pauseTour()
        {
            isPaused = true;
            if(!isInitialized)
                return;

            var playLists = player.getByClassName('PlayList');
            for(var i = 0, count = playLists.length; i<count; i++)
            {
                var playList = playLists[i];
                var index = playList.get('selectedIndex');
                if(index != -1)
                {
                    var item = playList.get('items')[index];
                    var itemPlayer = item.get('player');
                    if(itemPlayer && itemPlayer.pause)
                    {
                        playersPlayingTmp.push(itemPlayer);
                        itemPlayer.pause();
                    }
                }
            }

            player.getById('pauseGlobalAudios')();
        }

        function resumeTour()
        {
            isPaused = false;
            if(!isInitialized)
                return;

            while(playersPlayingTmp.length)
            {
                var viewer = playersPlayingTmp.pop();
                viewer.play();
            }

            player.getById('resumeGlobalAudios')();
        }

        function onVirtualTourLoaded()
        {
            if(isPaused)
                pauseTour();
        }

        function onVirtualTourEnded()
        {

        }

        function getRootPlayer()
        {
            return window.tdvplayer !== undefined ? window.tdvplayer.getById('rootPlayer') : undefined;
        }

        function setMediaByIndex(index)
        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                return rootPlayer.setMainMediaByIndex(index);
            }
        }

        function setMediaByName(name)
        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                return rootPlayer.setMainMediaByName(name);
            }
        }

        function triggerOverlayByName(item, name, eventName)
        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                item.bind('begin', function(e){
                    item.unbind('begin', arguments.callee, this);
                    var overlay = rootPlayer.getPanoramaOverlayByName(item.get('media'), name);
                    if(overlay)
                        rootPlayer.triggerOverlay(overlay, eventName);
                }, rootPlayer);
            }
        }

        function showPreloader()
        {
            var preloadContainer = document.getElementById('preloadContainer');
            if(preloadContainer != undefined)
                preloadContainer.style.opacity = 1;
        }

        function disposePreloader()
        {
            var preloadContainer = document.getElementById('preloadContainer');
            if(preloadContainer == undefined)
                return;

            var transitionEndName = transitionEndEventName();
            if(transitionEndName)
            {
                preloadContainer.addEventListener(transitionEndName, hide, false);
                preloadContainer.style.opacity = 0;
                setTimeout(hide, 500); //Force hide. Some cases the transitionend event isn't dispatched with an iFrame.
            }
            else
            {
                hide();
            }

            function hide()
            {
                
                preloadContainer.style.visibility = 'hidden';
                preloadContainer.style.display = 'none';
            }

            function transitionEndEventName () {
                var el = document.createElement('div');
                var transitions = {
                        'transition':'transitionend',
                        'OTransition':'otransitionend',
                        'MozTransition':'transitionend',
                        'WebkitTransition':'webkitTransitionEnd'
                    };

                var t;
                for (t in transitions) {
                    if (el.style[t] !== undefined) {
                        return transitions[t];
                    }
                }

                return undefined;
            }
        }

        function onBodyClick(){
            document.body.removeEventListener("click", onBodyClick);
            document.body.removeEventListener("touchend", onBodyClick);
            loadTour();
        }

        function onLoad() {
            if (/AppleWebKit/.test(navigator.userAgent) && /Mobile\/\w+/.test(navigator.userAgent))
            {
                var inIFrame = false;
                try
                {
                    inIFrame = (window.self !== window.top);
                }
                catch (e)
                {
                    inIFrame = true;
                }
                if (!inIFrame)
                {
                    var onResize = function(async)
                    {
                        [0, 250, 1000, 2000].forEach(function(delay)
                        {
                            setTimeout(function()
                            {
                                var viewer = document.querySelector('#viewer');
                                var scale = window.innerWidth / document.documentElement.clientWidth;
                                var width = document.documentElement.clientWidth;
                                var height = Math.round(window.innerHeight / scale);
                                viewer.style.width = width + 'px';
                                viewer.style.height = height + 'px';
                                viewer.style.left = Math.round((window.innerWidth - width) * 0.5) + 'px';
                                viewer.style.top = Math.round((window.innerHeight - height) * 0.5) + 'px';
                                viewer.style.transform = 'scale(' + scale + ', ' + scale + ')';
                                window.scrollTo(0,0);
                            }, delay);
                        });
                    };
                    window.addEventListener('resize', onResize);
                    onResize();
                }
            }


            if (isOVRWeb()){
                showPreloader();
                loadTour();
                return;
            }

            showPreloader();
loadTour()
        }

        function playVideo(video) {
            function isSafariDesktopV11orGreater() {
                return /^((?!chrome|android|crios|ipad|iphone).)*safari/i.test(navigator.userAgent) && parseFloat(/Version\/([0-9]+\.[0-9]+)/i.exec(navigator.userAgent)[1]) >= 11;
            }

            function detectUserAction() {
                var onVideoClick = function(e) {
                    if(video.paused) {
                        video.play();
                    }
                    video.muted = false;
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    e.preventDefault();
                    video.removeEventListener('click', onVideoClick);
                    video.removeEventListener('touchend', onVideoClick);
                };
                video.addEventListener("click", onVideoClick);
                video.addEventListener("touchend", onVideoClick);
            }

            if (isSafariDesktopV11orGreater()) {
                video.muted = true;
                video.play();
            } else {
                var canPlay = true;
                var promise = video.play();
                if (promise) {
                    promise.catch(function() {
                        video.muted = true;
                        video.play();
                        detectUserAction();
                    });
                } else {
                    canPlay = false;
                }

                if (!canPlay || video.muted) {
                    detectUserAction();
                }
            }
        }

        function isOVRWeb(){
            return window.location.hash.substring(1).split('&').indexOf('ovrweb') > -1;
        }
    </script>

    + ' Tugasmu memandu siswa/pengunjung dengan cara yang ramah, menarik, dan edukatif.'
    + ' Gunakan bahasa Indonesia yang santai tapi informatif. Jawaban singkat 2-4 kalimat, sesekali pakai emoji relevan.'
    + ' Jika menerima gambar, identifikasi semua objek yang terlihat, jelaskan nama, fungsi, fakta menarik, dan nilai edukasinya.';

  var msgs = [], loading = false, chatOpen = false;
  var recognition = null, isListening = false;

  /* ── TOGGLE JENDELA ── */
  window.vftToggle = function () {
    chatOpen = !chatOpen;
    document.getElementById('vft-win').className = chatOpen ? 'open' : 'closed';
    document.getElementById('vft-badge').style.display = chatOpen ? 'none' : '';
    if (chatOpen) setTimeout(function () { document.getElementById('vft-inp').focus(); }, 300);
  };

  /* ── CHIP SHORTCUT ── */
  window.vftChip = function (text) {
    document.getElementById('vft-inp').value = text;
    document.getElementById('vft-chips').style.display = 'none';
    vftSend();
  };

  /* ── KIRIM PESAN TEKS ── */
  window.vftSend = async function () {
    if (loading) return;
    var inp = document.getElementById('vft-inp');
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    hideChips();
    addMsg('u', text);
    msgs.push({ role: 'user', content: text });
    await runAPI();
  };

  /* ── SCAN OBJEK ── */
  window.vftStartScan = function () {
    if (CFG.autoCapture) {
      // Coba capture canvas 360° dari 3D Vista
      var canvas = document.querySelector('#viewer canvas');
      if (canvas) {
        try {
          var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          var b64 = dataUrl.split(',')[1];
          if (b64 && b64.length > 100) {
            processImage(b64, 'image/jpeg', dataUrl);
            return;
          }
        } catch (e) {
          // Canvas terkunci, lanjut fallback
        }
      }
    }
    // Fallback: buka file picker
    document.getElementById('vft-file').click();
  };

  /* ── HANDLE FILE UPLOAD ── */
  window.vftHandleFile = function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      var src = ev.target.result;
      var b64 = src.split(',')[1];
      processImage(b64, file.type, src);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  /* ── PROSES GAMBAR → KIRIM KE AI ── */
  function processImage(b64, mediaType, previewSrc) {
    hideChips();
    addMsg('u', '📷 <em>Menganalisis objek dalam pandangan 360°...</em>', previewSrc);
    // Push dummy text ke history UI
    msgs.push({ role: 'user', content: '(siswa meminta analisis visual dari pandangan saat ini)' });

    setScanStatus(true);
    loading = true;
    setSendDisabled(true);

    var typingEl = addTyping();

    callAPI(null, b64, mediaType).then(function (reply) {
      typingEl.remove();
      addMsg('b', reply);
      msgs.push({ role: 'assistant', content: reply });
    }).catch(function (e) {
      typingEl.remove();
      console.error(e);
      addMsg('b', 'Maaf, gagal menganalisis gambar. Coba lagi ya! 🙏');
    }).finally(function () {
      setScanStatus(false);
      loading = false;
      setSendDisabled(false);
    });
  }

  /* ── JALANKAN API (TEKS) ── */
  async function runAPI() {
    loading = true;
    setSendDisabled(true);
    var typingEl = addTyping();
    try {
      var reply = await callAPI(msgs);
      typingEl.remove();
      addMsg('b', reply);
      msgs.push({ role: 'assistant', content: reply });
    } catch (e) {
      typingEl.remove();
      console.error(e);
      addMsg('b', 'Maaf, ada gangguan koneksi. Coba lagi ya! 🙏');
    }
    loading = false;
    setSendDisabled(false);
  }

  /* ── PANGGIL GOOGLE GEMINI API ── */
  async function callAPI(history, imgB64, imgType) {
    var recent = (history || msgs).slice(-CFG.maxHistory);
    var apiMsgs = [];

    for (var i = 0; i < recent.length; i++) {
      // Jika request berupa gambar, kita lewati dummy text terakhir agar Gemini tidak error (harus selang-seling role)
      if (imgB64 && i === recent.length - 1) continue;

      apiMsgs.push({
        role: recent[i].role === 'assistant' ? 'model' : 'user',
        parts: [{ text: recent[i].content }]
      });
    }

    // Jika ada gambar, tambahkan payload khusus gambar
    if (imgB64) {
      apiMsgs.push({
        role: 'user',
        parts: [
          { inlineData: { mimeType: imgType || 'image/jpeg', data: imgB64 } },
          { text: 'Tolong identifikasi dan jelaskan semua objek menarik yang terlihat dalam gambar ini dari sudut pandang edukatif! Sebutkan nama objek, fungsinya, fakta menarik, dan nilai belajarnya.' }
        ]
      });
    }

    var payload = {
      systemInstruction: { parts: [{ text: SYSTEM }] },
      contents: apiMsgs,
      generationConfig: { maxOutputTokens: 700 }
    };

    // Menggunakan Gemini 1.5 Flash (Sangat cepat dan gratis untuk multimodal)
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + CFG.apiKey;

    var resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    var data = await resp.json();

    if (data.error) throw new Error(data.error.message);
    
    // Penanganan jika respon diblokir/kosong
    if (!data.candidates || data.candidates.length === 0) {
      if (data.promptFeedback && data.promptFeedback.blockReason) {
        return 'Maaf, pesan diblokir oleh sistem keamanan. Coba pertanyaan lain.';
      }
      return 'Maaf, tidak ada respon dari AI.';
    }

    var candidate = data.candidates[0];
    if (candidate.finishReason !== 'STOP' && !candidate.content) {
       return 'Maaf, respon dihentikan otomatis (Alasan: ' + candidate.finishReason + ').';
    }

    return candidate.content.parts[0].text;
  }

  /* ── SPEECH TO TEXT ── */
  window.vftToggleMic = function () {
    var supported = 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window;
    if (!supported) {
      addMsg('b', 'Browser ini belum mendukung mikrofon otomatis. Gunakan Chrome/Edge ya! 😊');
      return;
    }
    if (!recognition) {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = CFG.bahasa;
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.onresult = function (e) {
        var transcript = Array.from(e.results).map(function (r) { return r[0].transcript; }).join('');
        document.getElementById('vft-inp').value = transcript;
        if (e.results[e.results.length - 1].isFinal) {
          stopMic();
          vftSend();
        }
      };
      recognition.onerror = stopMic;
      recognition.onend = stopMic;
    }
    isListening ? stopMic() : startMic();
  };

  function startMic() {
    isListening = true;
    try { recognition.start(); } catch (e) {}
    document.getElementById('vft-mic').classList.add('active');
    document.getElementById('vft-inp').placeholder = '🎤 Bicara sekarang...';
  }

  function stopMic() {
    isListening = false;
    try { recognition.stop(); } catch (e) {}
    document.getElementById('vft-mic').classList.remove('active');
    document.getElementById('vft-inp').placeholder = 'Tanya Pak Wisnu...';
  }

  /* ── HELPERS UI ── */
  var typingCounter = 0;

  function addMsg(role, html, imgSrc) {
    var c = document.getElementById('vft-msgs');
    var d = document.createElement('div');
    d.className = 'vft-row ' + role;
    var inner = '';
    if (role === 'b') inner += '<div class="vft-mav">🌿</div>';
    inner += '<div class="vft-bub">';
    if (imgSrc) inner += '<img src="' + imgSrc + '" class="vft-img-prev">';
    inner += html + '</div>';
    d.innerHTML = inner;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
    return d;
  }

  function addTyping() {
    var id = 'vft-typing-' + (++typingCounter);
    var c = document.getElementById('vft-msgs');
    var d = document.createElement('div');
    d.className = 'vft-row b';
    d.id = id;
    d.innerHTML = '<div class="vft-mav">🌿</div><div class="vft-bub"><div class="vft-typing"><span></span><span></span><span></span></div></div>';
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
    return d;
  }

  function hideChips() {
    document.getElementById('vft-chips').style.display = 'none';
  }

  function setSendDisabled(v) {
    document.getElementById('vft-send').disabled = v;
  }

  function setScanStatus(active) {
    document.getElementById('vft-scan-hint').style.display = active ? 'none' : '';
    document.getElementById('vft-scan-status').style.display = active ? '' : 'none';
  }

})();
</script>
</body>
</html>

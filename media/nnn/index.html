        var player;
        var playersPlayingTmp = [];
        var isInitialized = false;
        var isPaused = false;

        function loadTour()
        {
            if(player)
                return;

            var beginFunc = function(event){
                if(event.name == 'begin')
                {
                    var camera = event.data.source.get('camera');
                    if(camera && camera.get('initialSequence') && camera.get('initialSequence').get('movements').length > 0)
                        return;
                }

                if(event.sourceClassName == "MediaAudio")
                    return;

                isInitialized = true;

                player.unbind('preloadMediaShow', beginFunc, player, true);
                player.unbindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
                player.unbind('stateChange', beginFunc, player, true);
                window.parent.postMessage("tourLoaded", '*');

                disposePreloader();

                onVirtualTourLoaded();
            };

            var settings = new TDV.PlayerSettings();
            
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773213194961');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773213194961');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773213194961');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773213194961');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);
            player.bind('stateChange', beginFunc, player, true);
            player.bindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
            player.bindOnObject('rootPlayer', 'start', function(e){
                var queryDict = {}; location.search.substr(1).split("&").forEach(function(item) {var k = item.split("=")[0], v = decodeURIComponent(item.split("=")[1]);queryDict[k] = v});
                var item = undefined;
                if("media-index" in queryDict){
                    item = setMediaByIndex(parseInt(queryDict["media-index"]) - 1);
                }
                else if("media-name" in queryDict){
                    item = setMediaByName(queryDict["media-name"]);
                }
                else{
                    item = setMediaByIndex(0);
                }
                if(item != undefined && "trigger-overlay-name" in queryDict){
                    triggerOverlayByName(item, queryDict["trigger-overlay-name"], "trigger-overlay-event" in queryDict ? queryDict["trigger-overlay-event"] : "click");
                }

                player.getById('rootPlayer').bind('tourEnded', function(){
                    onVirtualTourEnded();
                }, player, true);
            }, player, false);

            /* Listen messages */
            window.addEventListener('message', function (e) {
                //Listen to messages for make actions to player in the format function:param1,param2
                var action = e.data;
                if (action == 'pauseTour' || action == 'resumeTour') {
                    this[action].apply(this);
                }
            });
        }

        function pauseTour()
        {
            isPaused = true;
            if(!isInitialized)
                return;

            var playLists = player.getByClassName('PlayList');
            for(var i = 0, count = playLists.length; i<count; i++)
            {
                var playList = playLists[i];
                var index = playList.get('selectedIndex');
                if(index != -1)
                {
                    var item = playList.get('items')[index];
                    var itemPlayer = item.get('player');
                    if(itemPlayer && itemPlayer.pause)
                    {
                        playersPlayingTmp.push(itemPlayer);
                        itemPlayer.pause();
                    }
                }
            }

            player.getById('pauseGlobalAudios')();
        }

        function resumeTour()
        {
            isPaused = false;
            if(!isInitialized)
                return;

            while(playersPlayingTmp.length)
            {
                var viewer = playersPlayingTmp.pop();
                viewer.play();
            }

            player.getById('resumeGlobalAudios')();
        }

        function onVirtualTourLoaded()
        {
            if(isPaused)
                pauseTour();
        }

        function onVirtualTourEnded()
        {

        }

        {
            return window.tdvplayer !== undefined ? window.tdvplayer.getById('rootPlayer') : undefined;

        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                return rootPlayer.setMainMediaByIndex(index);
            }
        }

        function setMediaByName(name)
        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                return rootPlayer.setMainMediaByName(name);
            }
        }

        function triggerOverlayByName(item, name, eventName)
        {
            var rootPlayer = getRootPlayer();
            if(rootPlayer !== undefined) {
                item.bind('begin', function(e){
                    item.unbind('begin', arguments.callee, this);
                    var overlay = rootPlayer.getPanoramaOverlayByName(item.get('media'), name);
                    if(overlay)
                        rootPlayer.triggerOverlay(overlay, eventName);
                }, rootPlayer);
            }
        }

        function showPreloader()
        {
            var preloadContainer = document.getElementById('preloadContainer');
            if(preloadContainer != undefined)
                preloadContainer.style.opacity = 1;
        }

        function disposePreloader()
        {
            var preloadContainer = document.getElementById('preloadContainer');
            if(preloadContainer == undefined)
                return;

            var transitionEndName = transitionEndEventName();
            if(transitionEndName)
            {
                preloadContainer.addEventListener(transitionEndName, hide, false);
                preloadContainer.style.opacity = 0;
                setTimeout(hide, 500); //Force hide. Some cases the transitionend event isn't dispatched with an iFrame.
            }
            else
            {
                hide();
            }

            function hide()
            {
                
                preloadContainer.style.visibility = 'hidden';
                preloadContainer.style.display = 'none';
            }

            function transitionEndEventName () {
                var el = document.createElement('div');
                var transitions = {
                        'transition':'transitionend',
                        'OTransition':'otransitionend',
                        'MozTransition':'transitionend',
                        'WebkitTransition':'webkitTransitionEnd'
                    };

                var t;
                for (t in transitions) {
                    if (el.style[t] !== undefined) {
                        return transitions[t];
                    }
                }

                return undefined;
            }
        }

            document.body.removeEventListener("click", onBodyClick);

        }

                                viewer.style.height = height + 'px';
                                viewer.style.left = Math.round((window.innerWidth - width) * 0.5) + 'px';

                return;

loadTour()

            function isSafariDesktopV11orGreater() {
                return /^((?!chrome|android|crios|ipad|iphone).)*safari/i.test(navigator.userAgent) && parseFloat(/Version\/([0-9]+\.[0-9]+)/i.exec(navigator.userAgent)[1]) >= 11;
            }

            function detectUserAction() {
                var onVideoClick = function(e) {
                    if(video.paused) {
                        video.play();
                    }
                    video.muted = false;
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    e.preventDefault();
                    video.removeEventListener('click', onVideoClick);
                    video.removeEventListener('touchend', onVideoClick);
                };
                video.addEventListener("click", onVideoClick);
                video.addEventListener("touchend", onVideoClick);
            }

            if (isSafariDesktopV11orGreater()) {
                video.muted = true;
                video.play();
            } else {
                var canPlay = true;
                var promise = video.play();

                    promise.catch(function() {
                        video.muted = true;
                        video.play();
                        detectUserAction();
                    });
                } else {
                    canPlay = false;
                }

                if (!canPlay || video.muted) {
                    detectUserAction();
                }
            }
        }

            return window.location.hash.substring(1).split('&').indexOf('ovrweb') > -1;

          };
          video.addEventListener("click", onVideoClick);
          video.addEventListener("touchend", onVideoClick);

        if (isSafariDesktopV11orGreater()) {
          video.muted = true;
          video.play();
        } else {
          var canPlay = true;
          var promise = video.play();
          if (promise) {
            promise.catch(function () {
              video.muted = true;
              video.play();
              detectUserAction();
            });
          } else {
            canPlay = false;
          }

          if (!canPlay || video.muted) {
            detectUserAction();
          }

          let html = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

          html = html.replace(/\n/g, "<br>");

        // Konversi PCM ke WAV untuk Text-to-Speech
        function pcmToWav(pcmData, sampleRate) {
          const numChannels = 1;
          const byteRate = sampleRate * numChannels * 2;
          const blockAlign = numChannels * 2;
          const buffer = new ArrayBuffer(44 + pcmData.length);
          const view = new DataView(buffer);

          writeString(view, 0, "RIFF");
          view.setUint32(4, 36 + pcmData.length, true);
          writeString(view, 8, "WAVE");
          writeString(view, 12, "fmt ");
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, numChannels, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true);
          view.setUint16(32, blockAlign, true);
          view.setUint16(34, 16, true);
          writeString(view, 36, "data");
          view.setUint32(40, pcmData.length, true);

          const pcm16Data = new Uint8Array(pcmData);
          for (let i = 0; i < pcm16Data.length; i++) {
            view.setUint8(44 + i, pcm16Data[i]);
          }

          return buffer;
        }

        function writeString(view, offset, string) {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }

          typingDiv.className = "typing-indicator";
          typingDiv.id = "gt-typing";
          typingDiv.innerHTML = `
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                `;
          chatBody.insertBefore(typingDiv, quickActions);
          scrollToBottom();
          return typingDiv;
        }

        // --- FUNGSI UPLOAD GAMBAR ---
        uploadBtn.addEventListener("click", () => {
          fileUpload.click();
        });

        fileUpload.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
              imgPreview.src = event.target.result;
              imgPreviewArea.style.display = "block";

              // Ekstrak base64 data dan tipe mime
              const base64String = event.target.result.split(",")[1];
              currentBase64Image = base64String;
              currentMimeType = file.type;
            };
            reader.readAsDataURL(file);
          }
        });

        removeImgBtn.addEventListener("click", () => {
          imgPreview.src = "";
          imgPreviewArea.style.display = "none";
          fileUpload.value = "";
          currentBase64Image = null;
          currentMimeType = null;
        });

        // --- FUNGSI SPEECH TO TEXT (VOICE INPUT) ---
        let recognition;
        let isRecording = false;

        if (
          "webkitSpeechRecognition" in window ||
          "SpeechRecognition" in window
        ) {
          const SpeechRecognition =
            window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SpeechRecognition();
          recognition.lang = "id-ID"; // Bahasa Indonesia
          recognition.continuous = false;
          recognition.interimResults = false;

          recognition.onstart = function () {
            isRecording = true;
            micBtn.classList.add("recording");
            chatInput.placeholder = "Mendengarkan suara Anda...";
          };

          recognition.onresult = function (event) {
            const transcript = event.results[0][0].transcript;
            chatInput.value += (chatInput.value ? " " : "") + transcript;
          };

          recognition.onerror = function (event) {
            console.error("Kesalahan pengenalan suara:", event.error);
            isRecording = false;
            micBtn.classList.remove("recording");
            chatInput.placeholder = "Tanya atau unggah gambar...";
          };

          recognition.onend = function () {
            isRecording = false;
            micBtn.classList.remove("recording");
            chatInput.placeholder = "Tanya atau unggah gambar...";
          };

          micBtn.addEventListener("click", () => {
            if (isRecording) {
              recognition.stop();
            } else {
              recognition.start();
            }
          });
        } else {
          // Sembunyikan tombol jika browser tidak mendukung
          micBtn.style.display = "none";
        }

        // --- FUNGSI TEXT TO SPEECH API GEMINI ---
        async function fetchTTS(text) {
          const modelName = "gemini-2.0-flash";
          const url = `https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${apiKey}`;

          const payload = {
            contents: [
              {
                parts: [
                  {
                    text: text,
                  },
                ],
              },
            ],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                voiceConfig: {
                  prebuiltVoiceConfig: {
                    voiceName: "Kore", // Suara default
                  },
                },
              },
            },
            model: modelName,
          };

          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              console.warn("TTS API Not OK", response.status);
              return null; // Gagal TTS
            }

            const result = await response.json();

            if (
              result.candidates &&
              result.candidates[0] &&
              result.candidates[0].content &&
              result.candidates[0].content.parts[0] &&
              result.candidates[0].content.parts[0].inlineData
            ) {
              const inlineData =
                result.candidates[0].content.parts[0].inlineData;
              const pcmBase64 = inlineData.data;
              const mimeType = inlineData.mimeType; // cth: audio/L16; rate=24000

              // Ekstrak Sample Rate
              let sampleRate = 24000;
              const rateMatch = mimeType.match(/rate=(\d+)/);
              if (rateMatch && rateMatch[1]) {
                sampleRate = parseInt(rateMatch[1], 10);
              }

              // Decode Base64 ke ArrayBuffer
              const binaryString = window.atob(pcmBase64);
              const len = binaryString.length;
              const bytes = new Uint8Array(len);
              for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
              }

              // Konversi ke WAV
              const wavBuffer = pcmToWav(bytes.buffer, sampleRate);
              const wavBlob = new Blob([wavBuffer], { type: "audio/wav" });
              const audioUrl = URL.createObjectURL(wavBlob);

              return audioUrl;
            }
            return null;
          } catch (error) {
            console.error("Error TTS:", error);
            return null;
          }
        }

        // --- FUNGSI GENERATE CONTENT (TEXT & IMAGE) ---
        async function fetchGeminiResponse(userText, base64Img, mimeType) {
          // LOGIKA PINTAR:
          const modelName = "gemini-1.5-flash";
          const url = `https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${apiKey}`;

          chatHistory.push({ text: userText });
          const recentHistoryText = chatHistory
            .slice(-5)
            .map((msg) => msg.text)
            .join("\n---\n");

          let partsArray = [
            {
              text: `Konteks Percakapan Sebelumnya:\n${recentHistoryText}\n\nPesan Pengguna Saat Ini: ${userText}`,
            },
          ];

          // Tambahkan gambar ke payload jika ada
          if (base64Img && mimeType) {
            partsArray.push({
              inlineData: {
                mimeType: mimeType,
                data: base64Img,
              },
            });
          }

          const payload = {
            contents: [
              {
                parts: partsArray,
              },
            ],
            systemInstruction: {
              parts: [{ text: systemPrompt }],
            },
          };

          const delays = [1000, 2000, 4000, 8000, 16000];

          for (let i = 0; i <= delays.length; i++) {
            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

              if (!response.ok)
                throw new Error(`HTTP error! status: ${response.status}`);

              const result = await response.json();
              const aiReply = result.candidates?.[0]?.content?.parts?.[0]?.text;

              if (aiReply) {
                return aiReply;
              } else {
                throw new Error("Format balasan API tidak terduga");
              }
            } catch (error) {
              if (i === delays.length) {
                return "Maaf, koneksi ke server AI saat ini sedang tidak stabil. Pastikan API key Anda valid jika diuji di luar platform ini.";
              }
              await new Promise((resolve) => setTimeout(resolve, delays[i]));
            }
          }
        }

        // Aksi cepat
        window.sendQuickAction = async function (text) {
          chatInput.value = text;
          sendMessage();
        };

        async function sendMessage() {
          const text = chatInput.value.trim();
          if (!text && !currentBase64Image) return; // Butuh teks atau gambar

          chatInput.disabled = true;
          sendBtn.disabled = true;
          uploadBtn.disabled = true;
          if (micBtn) micBtn.disabled = true;

          // Tampilkan pesan user (dan gambar jika ada)
          const imgUrl = currentBase64Image
            ? `data:${currentMimeType};base64,${currentBase64Image}`
            : null;
          appendMessage(text || "Mengirim gambar...", "user", imgUrl);

          // Simpan state gambar untuk dikirim ke API, lalu reset UI
          const payloadImg = currentBase64Image;
          const payloadMime = currentMimeType;

          chatInput.value = "";
          removeImgBtn.click(); // Reset preview
          quickActions.style.display = "none";

          const typingIndicator = showTypingIndicator();

          // 1. Dapatkan balasan teks dari AI
          const replyText = await fetchGeminiResponse(
            text,
            payloadImg,
            payloadMime,
          );

          // 2. Opsional: Dapatkan suara (TTS)
          let audioUrl = null;
          // Hanya jalankan TTS jika tidak error koneksi
          if (!replyText.startsWith("Maaf, koneksi")) {
            // Filter markdown dari text agar TTS terdengar lebih natural
            const cleanText = replyText.replace(/[*#]/g, "").slice(0, 500); // Batasi panjang TTS
            audioUrl = await fetchTTS(cleanText);
          }

          if (document.getElementById("gt-typing")) {
            document.getElementById("gt-typing").remove();
          }

          // Tampilkan balasan AI berserta tombol Play Audio jika berhasil
          appendMessage(replyText, "ai", null, audioUrl);

          chatInput.disabled = false;
          sendBtn.disabled = false;
          uploadBtn.disabled = false;
          if (micBtn) micBtn.disabled = false;
          chatInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        chatInput.addEventListener("keypress", function (e) {
          if (e.key === "Enter") sendMessage();
        });
      });
    </script>
  </body>
